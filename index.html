<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Universal AI Chat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --sidebar-width: 280px;
        }
        /* Fix for mobile height issues */
        body {
            min-height: 100vh;
            min-height: 100svh;
            background-color: #f9fafb;
        }
        .dark body {
            background-color: #131314;
        }
        #chat-container {
            height: calc(100svh - 140px);
        }
        .glass-input {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(8px);
        }
        .dark .glass-input {
            background: rgba(30, 31, 32, 0.8);
        }
        .sidebar-transition {
            transition: transform 0.3s ease-in-out;
        }
        /* Markdown Styling */
        .prose pre {
            background: #1e1e1e;
            color: #efefef;
            padding: 1rem;
            border-radius: 0.5rem;
            overflow-x: auto;
            margin: 0.5rem 0;
        }
        .prose code { font-family: monospace; font-size: 0.9em; }
        /* Hide scrollbars */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        #loading-overlay {
            position: fixed;
            inset: 0;
            z-index: 9999;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 1rem;
        }
        .dark #loading-overlay { background: #131314; color: white; }
    </style>
</head>
<body class="text-slate-900 dark:text-slate-100 transition-colors duration-200">

    <div id="loading-overlay">
        <div class="animate-spin rounded-full h-12 w-12 border-4 border-blue-500 border-t-transparent"></div>
        <p class="font-medium">Initializing AI Interface...</p>
    </div>

    <div id="app" class="hidden flex h-screen overflow-hidden">
        
        <aside id="sidebar" class="fixed inset-y-0 left-0 z-50 w-[280px] bg-slate-50 dark:bg-[#1e1f20] border-r border-slate-200 dark:border-slate-700 sidebar-transition -translate-x-full lg:translate-x-0 lg:static lg:inset-auto">
            <div class="flex flex-col h-full p-4">
                <button onclick="createNewChat()" class="flex items-center gap-3 px-4 py-3 bg-slate-200 dark:bg-slate-800 hover:bg-slate-300 dark:hover:bg-slate-700 rounded-full transition-all mb-8">
                    <i data-lucide="plus" class="w-5 h-5"></i>
                    <span class="font-medium">New Chat</span>
                </button>

                <div class="flex-1 overflow-y-auto no-scrollbar space-y-2" id="chat-list">
                    </div>

                <div class="pt-4 border-t border-slate-200 dark:border-slate-700 space-y-2">
                    <button onclick="toggleSettings()" class="flex items-center gap-3 w-full p-3 hover:bg-slate-200 dark:hover:bg-slate-800 rounded-lg transition">
                        <i data-lucide="settings" class="w-5 h-5"></i>
                        <span>Settings</span>
                    </button>
                    <button onclick="toggleDarkMode()" class="flex items-center gap-3 w-full p-3 hover:bg-slate-200 dark:hover:bg-slate-800 rounded-lg transition">
                        <i data-lucide="moon" id="theme-icon" class="w-5 h-5"></i>
                        <span id="theme-text">Dark Mode</span>
                    </button>
                </div>
            </div>
        </aside>

        <main class="flex-1 flex flex-col relative min-w-0 bg-white dark:bg-[#131314]">
            <header class="flex items-center justify-between p-4 lg:px-8">
                <div class="flex items-center gap-4">
                    <button onclick="toggleSidebar()" class="lg:hidden p-2 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-full">
                        <i data-lucide="menu"></i>
                    </button>
                    <h1 class="text-xl font-semibold tracking-tight">Gemini <span class="text-blue-500">Clone</span></h1>
                </div>
                <div id="active-model-badge" class="text-xs px-2 py-1 bg-blue-100 dark:bg-blue-900/30 text-blue-600 rounded">
                    ...
                </div>
            </header>

            <div id="chat-container" class="flex-1 overflow-y-auto px-4 py-6 space-y-8 lg:px-24">
                <div id="welcome-screen" class="flex flex-col items-center justify-center h-full text-center space-y-4">
                    <div class="text-4xl font-medium text-slate-400">How can I help you today?</div>
                </div>
                <div id="messages-wrapper" class="space-y-8 pb-12"></div>
            </div>

            <div class="p-4 lg:px-24 pb-8">
                <div class="relative max-w-4xl mx-auto">
                    <div class="glass-input border border-slate-300 dark:border-slate-600 rounded-2xl shadow-sm focus-within:ring-2 ring-blue-500 transition-all">
                        <textarea 
                            id="user-input"
                            rows="1"
                            placeholder="Message Gemini..."
                            class="w-full p-4 pr-16 bg-transparent outline-none resize-none max-h-48"
                            oninput="autoResize(this)"
                        ></textarea>
                        <button 
                            onclick="sendMessage()"
                            id="send-btn"
                            class="absolute right-3 bottom-3 p-2 bg-blue-600 hover:bg-blue-700 text-white rounded-xl disabled:opacity-50 disabled:cursor-not-allowed transition"
                        >
                            <i data-lucide="send-horizontal" class="w-5 h-5"></i>
                        </button>
                    </div>
                    <p class="text-[10px] text-center mt-2 text-slate-400">Gemini may display inaccurate info, including about people, so double-check its responses.</p>
                </div>
            </div>
        </main>
    </div>

    <div id="settings-modal" class="fixed inset-0 z-[100] hidden flex items-center justify-center p-4 bg-black/50 backdrop-blur-sm">
        <div class="bg-white dark:bg-[#1e1f20] w-full max-w-md rounded-2xl p-6 shadow-xl">
            <h2 class="text-xl font-bold mb-4">Configuration</h2>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium mb-1">OpenRouter API Key</label>
                    <input type="password" id="api-key-input" class="w-full p-2 rounded bg-slate-100 dark:bg-slate-800 border border-slate-300 dark:border-slate-600 outline-none focus:ring-2 ring-blue-500">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1">Model ID</label>
                    <input type="text" id="model-input" placeholder="e.g. google/gemini-pro-1.5" class="w-full p-2 rounded bg-slate-100 dark:bg-slate-800 border border-slate-300 dark:border-slate-600 outline-none focus:ring-2 ring-blue-500">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1">System Prompt</label>
                    <textarea id="system-prompt-input" rows="3" class="w-full p-2 rounded bg-slate-100 dark:bg-slate-800 border border-slate-300 dark:border-slate-600 outline-none focus:ring-2 ring-blue-500"></textarea>
                </div>
                <div class="flex justify-end gap-2 pt-4">
                    <button onclick="toggleSettings()" class="px-4 py-2 hover:bg-slate-100 dark:hover:bg-slate-800 rounded">Cancel</button>
                    <button onclick="saveSettings()" class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700">Save Changes</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- State Management ---
        let state = {
            apiKey: localStorage.getItem('openrouter_key') || '',
            model: localStorage.getItem('selected_model') || 'deepseek/deepseek-r1:free',
            systemPrompt: localStorage.getItem('system_prompt') || 'You are a helpful AI assistant.',
            chats: JSON.parse(localStorage.getItem('chats')) || [],
            currentChatId: null,
            isDark: localStorage.getItem('theme') === 'dark',
            isSidebarOpen: false
        };

        // --- Initialization ---
        window.addEventListener('DOMContentLoaded', () => {
            initLucide();
            applyTheme();
            renderChatList();
            updateModelBadge();
            
            // Populate inputs
            document.getElementById('api-key-input').value = state.apiKey;
            document.getElementById('model-input').value = state.model;
            document.getElementById('system-prompt-input').value = state.systemPrompt;

            // Hide loader
            setTimeout(() => {
                document.getElementById('loading-overlay').classList.add('hidden');
                document.getElementById('app').classList.remove('hidden');
            }, 500);
        });

        function initLucide() {
            lucide.createIcons();
        }

        // --- UI Logic ---
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            state.isSidebarOpen = !state.isSidebarOpen;
            sidebar.style.transform = state.isSidebarOpen ? 'translateX(0)' : 'translateX(-100%)';
            if (window.innerWidth >= 1024) sidebar.style.transform = 'none';
        }

        function toggleDarkMode() {
            state.isDark = !state.isDark;
            applyTheme();
        }

        function applyTheme() {
            const html = document.documentElement;
            const icon = document.getElementById('theme-icon');
            const text = document.getElementById('theme-text');
            
            if (state.isDark) {
                html.classList.add('dark');
                icon.setAttribute('data-lucide', 'sun');
                text.innerText = 'Light Mode';
            } else {
                html.classList.remove('dark');
                icon.setAttribute('data-lucide', 'moon');
                text.innerText = 'Dark Mode';
            }
            localStorage.setItem('theme', state.isDark ? 'dark' : 'light');
            initLucide();
        }

        function toggleSettings() {
            const modal = document.getElementById('settings-modal');
            modal.classList.toggle('hidden');
        }

        function saveSettings() {
            state.apiKey = document.getElementById('api-key-input').value;
            state.model = document.getElementById('model-input').value;
            state.systemPrompt = document.getElementById('system-prompt-input').value;

            localStorage.setItem('openrouter_key', state.apiKey);
            localStorage.setItem('selected_model', state.model);
            localStorage.setItem('system_prompt', state.systemPrompt);
            
            updateModelBadge();
            toggleSettings();
            alert('Settings saved!');
        }

        function updateModelBadge() {
            document.getElementById('active-model-badge').innerText = state.model.split('/').pop();
        }

        function autoResize(textarea) {
            textarea.style.height = 'auto';
            textarea.style.height = textarea.scrollHeight + 'px';
        }

        // --- Chat Core ---
        function createNewChat() {
            const newChat = {
                id: Date.now(),
                title: 'New Conversation',
                messages: []
            };
            state.chats.unshift(newChat);
            state.currentChatId = newChat.id;
            saveChats();
            renderChatList();
            renderMessages();
            if(window.innerWidth < 1024) toggleSidebar();
        }

        function saveChats() {
            localStorage.setItem('chats', JSON.stringify(state.chats));
        }

        function deleteChat(id, event) {
            event.stopPropagation();
            state.chats = state.chats.filter(c => c.id !== id);
            if (state.currentChatId === id) state.currentChatId = null;
            saveChats();
            renderChatList();
            renderMessages();
        }

        function selectChat(id) {
            state.currentChatId = id;
            renderMessages();
            renderChatList();
            if(window.innerWidth < 1024) toggleSidebar();
        }

        function renderChatList() {
            const list = document.getElementById('chat-list');
            list.innerHTML = state.chats.map(chat => `
                <div onclick="selectChat(${chat.id})" class="group flex items-center justify-between p-3 rounded-lg cursor-pointer transition ${state.currentChatId === chat.id ? 'bg-blue-100 dark:bg-blue-900/40 text-blue-600' : 'hover:bg-slate-200 dark:hover:bg-slate-800'}">
                    <div class="flex items-center gap-3 truncate">
                        <i data-lucide="message-square" class="w-4 h-4 flex-shrink-0"></i>
                        <span class="truncate text-sm">${chat.title}</span>
                    </div>
                    <button onclick="deleteChat(${chat.id}, event)" class="opacity-0 group-hover:opacity-100 p-1 hover:text-red-500">
                        <i data-lucide="trash-2" class="w-4 h-4"></i>
                    </button>
                </div>
            `).join('');
            initLucide();
        }

        function renderMessages() {
            const wrapper = document.getElementById('messages-wrapper');
            const welcome = document.getElementById('welcome-screen');
            const chat = state.chats.find(c => c.id === state.currentChatId);

            if (!chat || chat.messages.length === 0) {
                wrapper.innerHTML = '';
                welcome.classList.remove('hidden');
                return;
            }

            welcome.classList.add('hidden');
            wrapper.innerHTML = chat.messages.map(msg => `
                <div class="flex ${msg.role === 'user' ? 'justify-end' : 'justify-start'} animate-in fade-in slide-in-from-bottom-2">
                    <div class="max-w-[85%] lg:max-w-[70%] flex gap-4 ${msg.role === 'user' ? 'flex-row-reverse' : ''}">
                        <div class="w-8 h-8 rounded-full flex-shrink-0 flex items-center justify-center ${msg.role === 'user' ? 'bg-blue-600' : 'bg-emerald-600'} text-white">
                            <i data-lucide="${msg.role === 'user' ? 'user' : 'bot'}" class="w-5 h-5"></i>
                        </div>
                        <div class="space-y-2">
                            <div class="prose dark:prose-invert max-w-none text-slate-800 dark:text-slate-200">
                                ${marked.parse(msg.content)}
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
            initLucide();
            const container = document.getElementById('chat-container');
            container.scrollTop = container.scrollHeight;
        }

        // --- API & Streaming ---
        async function sendMessage() {
            const input = document.getElementById('user-input');
            const content = input.value.trim();
            if (!content || !state.apiKey) {
                if(!state.apiKey) toggleSettings();
                return;
            }

            if (!state.currentChatId) {
                const newChat = { id: Date.now(), title: content.substring(0, 30), messages: [] };
                state.chats.unshift(newChat);
                state.currentChatId = newChat.id;
            }

            const chat = state.chats.find(c => c.id === state.currentChatId);
            chat.messages.push({ role: 'user', content });
            
            input.value = '';
            autoResize(input);
            renderMessages();
            renderChatList();

            // Prepare for AI Response
            const aiMsgId = Date.now();
            chat.messages.push({ role: 'assistant', content: '', id: aiMsgId });
            renderMessages();

            try {
                const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${state.apiKey}`,
                        "Content-Type": "application/json",
                        "HTTP-Referer": window.location.href,
                        "X-Title": "Gemini Clone"
                    },
                    body: JSON.stringify({
                        model: state.model,
                        messages: [
                            { role: "system", content: state.systemPrompt },
                            ...chat.messages.slice(0, -1).map(m => ({ role: m.role, content: m.content }))
                        ],
                        stream: true
                    })
                });

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let fullResponse = "";

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    const chunk = decoder.decode(value);
                    const lines = chunk.split('\n').filter(line => line.trim() !== '');
                    
                    for (const line of lines) {
                        const payload = line.replace(/^data: /, '');
                        if (payload === '[DONE]') break;
                        
                        try {
                            const json = JSON.parse(payload);
                            const token = json.choices[0]?.delta?.content || "";
                            fullResponse += token;
                            
                            // Update state and UI in real-time
                            chat.messages[chat.messages.length - 1].content = fullResponse;
                            updateLastMessageUI(fullResponse);
                        } catch (e) {
                            console.error("Stream parsing error", e);
                        }
                    }
                }
                saveChats();
            } catch (error) {
                console.error(error);
                chat.messages[chat.messages.length - 1].content = "⚠️ Error: " + error.message;
                renderMessages();
            }
        }

        function updateLastMessageUI(content) {
            const wrapper = document.getElementById('messages-wrapper');
            const lastMsgDiv = wrapper.lastElementChild?.querySelector('.prose');
            if (lastMsgDiv) {
                lastMsgDiv.innerHTML = marked.parse(content);
                const container = document.getElementById('chat-container');
                container.scrollTop = container.scrollHeight;
            }
        }
    </script>
</body>
</html>
